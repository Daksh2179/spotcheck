version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: spotcheck_postgres
    environment:
      POSTGRES_DB: spotcheck
      POSTGRES_USER: spotcheck_user
      POSTGRES_PASSWORD: spotcheck_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: